services:
  - type: web
    name: gerenciador-alunos-api
    runtime: node
    plan: free
    rootDir: apps/api
    buildCommand: npm ci && npm run build
    startCommand: npm run start:prod
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: CORS_ORIGIN
        sync: false
