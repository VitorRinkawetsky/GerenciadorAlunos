name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/api/**'
      - '.github/workflows/backend.yml'

defaults:
  run:
    working-directory: apps/api

env:
  NODE_VERSION: '22'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/api/package-lock.json
      - run: npm ci
      - run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/api/package-lock.json
      - run: npm ci
      - run: npm test -- --ci --coverage
      - run: npm run test:e2e

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/api/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: api-dist
          path: apps/api/dist
          retention-days: 7

  deploy:
    name: Deploy (Render)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
    defaults:
      run:
        working-directory: .
    steps:
      - name: Trigger Render deploy hook
        if: ${{ env.RENDER_DEPLOY_HOOK_URL != '' }}
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
      - name: Skip deploy
        if: ${{ env.RENDER_DEPLOY_HOOK_URL == '' }}
        run: |
          echo "::warning::RENDER_DEPLOY_HOOK_URL secret is not set, skipping deploy. See DEPLOY.md."
