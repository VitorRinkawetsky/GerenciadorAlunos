name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/api/**'
      - '.github/workflows/backend.yml'

defaults:
  run:
    working-directory: apps/api

env:
  NODE_VERSION: '22'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/api/package-lock.json
      - run: npm ci
      - run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/api/package-lock.json
      - run: npm ci
      - run: npm test -- --ci --coverage
      - run: npm run test:e2e

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/api/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: api-dist
          path: apps/api/dist
          retention-days: 7

  deploy:
    name: Deploy (EC2 via SSM)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
    defaults:
      run:
        working-directory: .
    steps:
      - name: Configure AWS credentials
        if: ${{ env.AWS_ACCESS_KEY_ID != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Deploy via SSM Run Command
        if: ${{ env.AWS_ACCESS_KEY_ID != '' }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ vars.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["cd /home/ec2-user/app && sudo -u ec2-user git pull", "cd /home/ec2-user/app/apps/api && sudo -u ec2-user npm ci && sudo -u ec2-user npm run build", "systemctl restart gerenciador-api"]' \
            --query 'Command.CommandId' --output text)
          echo "Command ID: $COMMAND_ID"
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "${{ vars.EC2_INSTANCE_ID }}" || true
          STATUS=$(aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "${{ vars.EC2_INSTANCE_ID }}" --query 'Status' --output text)
          echo "Status: $STATUS"
          aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "${{ vars.EC2_INSTANCE_ID }}" --query 'StandardOutputContent' --output text
          aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "${{ vars.EC2_INSTANCE_ID }}" --query 'StandardErrorContent' --output text
          if [ "$STATUS" != "Success" ]; then
            exit 1
          fi
      - name: Skip deploy
        if: ${{ env.AWS_ACCESS_KEY_ID == '' }}
        run: |
          echo "::warning::AWS_ACCESS_KEY_ID secret is not set, skipping deploy. See DEPLOY.md."
